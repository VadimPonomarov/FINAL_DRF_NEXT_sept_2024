<!DOCTYPE html>
<html>
<head>
    <title>Test Authentication</title>
</head>
<body>
    <h1>Authentication Test</h1>
    <button onclick="testLogin()">Login as Admin</button>
    <button onclick="testToken()">Check Token</button>
    <button onclick="goToSearch()">Go to Search</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@autoria.com',
                        password: '12345678'
                    }),
                    credentials: 'include'
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Login Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        async function testToken() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/token', {
                    method: 'POST',
                    credentials: 'include'
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Token Result:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        function goToSearch() {
            window.location.href = 'http://localhost:3000/autoria/search';
        }
    </script>
</body>
</html>
