# Cloudflare Tunnel Configuration
# Бесплатный unified domain без сервера

tunnel: your-tunnel-id  # Получить после создания tunnel
credentials-file: /path/to/credentials.json

ingress:
  # Frontend → Vercel
  - hostname: your-domain.com
    service: https://autoria-clone.vercel.app
  - hostname: www.your-domain.com  
    service: https://autoria-clone.vercel.app

  # Backend API → Railway
  - hostname: api.your-domain.com
    service: https://autoria-web-production.up.railway.app
    originRequest:
      noTLSVerify: false

  # Redis API → Vercel (Next.js routes)
  - hostname: redis.your-domain.com
    service: https://autoria-clone.vercel.app
    originRequest:
      noTLSVerify: false

  # Admin → Railway
  - hostname: admin.your-domain.com
    service: https://autoria-web-production.up.railway.app

  # Health check
  - hostname: health.your-domain.com
    service: https://autoria-web-production.up.railway.app/health/

  # Catch all
  - service: https://autoria-clone.vercel.app
