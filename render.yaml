services:
  # Django DRF Backend
  - type: web
    name: autoria-backend
    runtime: python
    region: frankfurt
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi_simple:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: False
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_railway
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,autoria-clone.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: autoria-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: autoria-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://autoria-clone.vercel.app
      - key: CORS_ALLOW_CREDENTIALS
        value: True
      - key: IS_DOCKER
        value: false
      - key: IS_SEEDING_REQUIRED
        value: true
      - key: RUN_SEEDS
        value: true
      - key: FORCE_RESEED
        value: true
    healthCheckPath: /health/

  # Celery Worker (optional)
  - type: worker
    name: autoria-celery-worker
    runtime: python
    region: frankfurt
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autoria-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: autoria-redis
          property: connectionString

databases:
  # PostgreSQL Database
  - name: autoria-db
    databaseName: autoria
    user: autoria_user
    region: frankfurt
    plan: free

  # Redis Cache
  - name: autoria-redis
    region: frankfurt
    plan: free
