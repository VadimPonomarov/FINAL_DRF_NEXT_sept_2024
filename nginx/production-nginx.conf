events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Railway Backend (production)
    upstream railway_backend {
        server autoria-web-production.up.railway.app:443;
    }

    # Railway Redis (production)
    upstream railway_redis {
        server junction.proxy.rlwy.net:25906;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    server {
        listen 80;
        server_name your-domain.com; # Заменить на реальный домен

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "origin-when-cross-origin" always;

        # Health check
        location = /nginx-health { 
            return 200 'ok'; 
            add_header Content-Type text/plain; 
        }

        # Frontend -> Vercel (production)
        location / {
            proxy_pass https://autoria-clone.vercel.app;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js internal API routes -> Vercel (не трогаем)
        location ^~ /api/redis {
            proxy_pass https://autoria-clone.vercel.app/api/redis;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location ^~ /api/backend-health {
            proxy_pass https://autoria-clone.vercel.app/api/backend-health;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # NextAuth routes -> Vercel
        location ^~ /api/auth/ {
            proxy_pass https://autoria-clone.vercel.app/api/auth/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django API routes -> Railway Backend
        location ^~ /api/users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS
            add_header Access-Control-Allow-Origin "https://autoria-clone.vercel.app" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location ^~ /api/autoria/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin и docs -> Railway Backend
        location ^~ /admin/ { 
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_set_header Host $proxy_host;
        }
        
        location ^~ /api/doc/ { 
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_set_header Host $proxy_host;
        }
        
        location ^~ /api/redoc/ { 
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_set_header Host $proxy_host;
        }

        # Health endpoints
        location ^~ /health { 
            proxy_pass https://autoria-web-production.up.railway.app/health/;
        }

        # Static files -> Railway Backend
        location ^~ /static/ { 
            proxy_pass https://autoria-web-production.up.railway.app;
        }
        
        location ^~ /media/ { 
            proxy_pass https://autoria-web-production.up.railway.app;
        }

        # WebSocket для Django Channels (если нужно)
        location ^~ /api/chat/ {
            proxy_pass https://autoria-web-production.up.railway.app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $proxy_host;
            proxy_read_timeout 300s;
        }
    }

    # HTTPS configuration
    server {
        listen 443 ssl http2;
        server_name your-domain.com;

        # SSL сертификаты (Let's Encrypt)
        # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        
        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;

        # Такая же конфигурация как для HTTP
        # ... (скопировать все location блоки)
    }
}
