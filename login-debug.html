<!DOCTYPE html>
<html>
<head>
    <title>Login Debug</title>
</head>
<body>
    <h1>Login Debug Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing login...';
            
            try {
                console.log('Starting login test...');
                
                const response = await fetch('https://autoria-web-production.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: 'admin@autoria.com', 
                        password: '12345678' 
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                result.innerHTML = `
                    <h3>Success! Status: ${response.status}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                if (data.access) {
                    result.innerHTML += '<p style="color: green">✅ Login successful!</p>';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                result.innerHTML = `
                    <p style="color: red">❌ Error: ${error.message}</p>
                    <p>Check console for more details</p>
                `;
            }
        }
    </script>
</body>
</html>
