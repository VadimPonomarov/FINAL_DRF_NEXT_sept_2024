[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'pip install -r requirements.txt --upgrade && python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi_simple:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 4
healthcheckPath = "/health/"
healthcheckTimeout = 300

[variables]
PYTHON_VERSION = "3.11"
