<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test - No Redis</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; padding: 15px; margin: 10px 0; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .test-section { border: 1px solid #ddd; margin: 10px 0; padding: 15px; border-radius: 4px; }
        h3 { margin-top: 0; color: #333; }
        .step { margin: 5px 0; }
        .step-number { background: #007bff; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Login Debug Test - После удаления Redis</h1>
        <p><strong>Цель:</strong> Найти почему логин не работает после полного удаления Redis</p>
        
        <div class="test-section">
            <h3>📊 Статус тестирования</h3>
            <div id="status" class="status info">Готов к тестированию...</div>
        </div>

        <div class="test-section">
            <h3>🌐 Тест 1: Проверка API endpoints</h3>
            <button onclick="testEndpoints()">Проверить API endpoints</button>
            <div id="endpoints-result"></div>
        </div>

        <div class="test-section">
            <h3>🔐 Тест 2: Логин форма</h3>
            <div class="step">
                <span class="step-number">1</span>
                <input type="email" id="email" placeholder="Email" value="admin@autoria.com">
            </div>
            <div class="step">
                <span class="step-number">2</span>
                <input type="password" id="password" placeholder="Password" value="12345678">
            </div>
            <div class="step">
                <span class="step-number">3</span>
                <button onclick="testLogin()">Тест логина</button>
            </div>
            <div id="login-result"></div>
        </div>

        <div class="test-section">
            <h3>🏃‍♂️ Быстрый тест</h3>
            <button onclick="runAllTests()" style="background: #28a745; font-size: 16px;">Запустить все тесты</button>
        </div>

        <div class="test-section">
            <h3>📋 Детальный лог</h3>
            <button onclick="clearLog()">Очистить лог</button>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://autoria-web-production.up.railway.app';
        const FRONTEND_URL = 'https://autoria-clone.vercel.app';

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEl = document.getElementById('log');
            const color = {
                'error': '#dc3545',
                'success': '#28a745', 
                'warning': '#ffc107',
                'info': '#17a2b8'
            }[type] || '#17a2b8';
            
            logEl.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function testEndpoints() {
            log('🔍 Начинаем тестирование API endpoints...', 'info');
            setStatus('Тестируем API endpoints...', 'warning');

            const endpoints = [
                { url: `${FRONTEND_URL}/api/auth/token`, name: 'Frontend Token API', method: 'GET' },
                { url: `${FRONTEND_URL}/api/auth/login`, name: 'Frontend Login API', method: 'POST', body: { email: 'test@test.com', password: 'test' }},
                { url: `${FRONTEND_URL}/api/redis?key=test`, name: 'Redis API (должен быть 404)', method: 'GET' },
                { url: `${BACKEND_URL}/api/auth/login`, name: 'Backend Login', method: 'POST', body: { email: 'admin@autoria.com', password: '12345678' } }
            ];

            let results = '';
            
            for (const endpoint of endpoints) {
                try {
                    log(`Тестируем: ${endpoint.name}`, 'info');
                    
                    const options = {
                        method: endpoint.method,
                        headers: { 'Content-Type': 'application/json' }
                    };
                    
                    if (endpoint.body) {
                        options.body = JSON.stringify(endpoint.body);
                    }

                    const response = await fetch(endpoint.url, options);
                    const status = response.status;
                    
                    let responseText = '';
                    try {
                        const data = await response.json();
                        responseText = JSON.stringify(data, null, 2);
                    } catch {
                        responseText = await response.text();
                    }

                    const resultClass = status >= 200 && status < 300 ? 'success' : status === 404 && endpoint.name.includes('должен быть 404') ? 'success' : 'error';
                    results += `<div class="status ${resultClass}">
                        <strong>${endpoint.name}:</strong> ${status} ${response.statusText}<br>
                        <small>${responseText.substring(0, 200)}${responseText.length > 200 ? '...' : ''}</small>
                    </div>`;
                    
                    log(`${endpoint.name}: ${status} ${response.statusText}`, status >= 200 && status < 300 ? 'success' : 'error');
                    
                } catch (error) {
                    results += `<div class="status error"><strong>${endpoint.name}:</strong> ERROR - ${error.message}</div>`;
                    log(`${endpoint.name}: ERROR - ${error.message}`, 'error');
                }
            }

            document.getElementById('endpoints-result').innerHTML = results;
            setStatus('Тестирование API endpoints завершено', 'success');
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            log(`🔐 Тестируем логин с credentials: ${email}`, 'info');
            setStatus('Тестируем логин...', 'warning');

            try {
                // Тест 1: Frontend Login API
                log('Шаг 1: Тестируем /api/auth/login (frontend)', 'info');
                
                const loginResponse = await fetch(`${FRONTEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const loginData = await loginResponse.json();
                
                if (!loginResponse.ok) {
                    throw new Error(`Frontend login failed: ${loginResponse.status} - ${JSON.stringify(loginData)}`);
                }

                log(`Frontend login успешен: ${JSON.stringify(loginData)}`, 'success');

                // Тест 2: Проверяем что токены есть
                log('Шаг 2: Проверяем токены через /api/auth/token', 'info');
                
                const tokenResponse = await fetch(`${FRONTEND_URL}/api/auth/token`);
                const tokenData = await tokenResponse.json();
                
                log(`Token check: ${JSON.stringify(tokenData)}`, tokenData.access ? 'success' : 'warning');

                // Результат
                document.getElementById('login-result').innerHTML = `
                    <div class="status success">
                        <strong>✅ Логин успешен!</strong><br>
                        <small>Login Response: ${JSON.stringify(loginData)}<br>
                        Token Check: ${JSON.stringify(tokenData)}</small>
                    </div>
                `;
                
                setStatus('Логин тест завершен успешно!', 'success');

            } catch (error) {
                log(`❌ Логин ERROR: ${error.message}`, 'error');
                
                document.getElementById('login-result').innerHTML = `
                    <div class="status error">
                        <strong>❌ Логин не удался!</strong><br>
                        <small>${error.message}</small>
                    </div>
                `;
                
                setStatus('Логин тест провалился', 'error');
            }
        }

        async function runAllTests() {
            log('🚀 Запускаем полный тест...', 'info');
            setStatus('Выполняется полный тест...', 'warning');
            
            await testEndpoints();
            await new Promise(resolve => setTimeout(resolve, 1000));
            await testLogin();
            
            setStatus('Полный тест завершен!', 'success');
            log('✅ Полный тест завершен!', 'success');
        }

        // Автозапуск при загрузке
        window.onload = () => {
            log('🔧 Debug тест загружен. Готов к тестированию логина без Redis.', 'info');
        };
    </script>
</body>
</html>
